<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Andrew Atkinson — Résumés</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400&display=swap');

    :root {
      --bg:     #ffffff;
      --ink-1:  #1a1a1a;
      --ink-2:  #444444;
      --ink-3:  #555555;
      --ink-4:  #999999;
      --rule-1: #cccccc;
      --rule-2: #e8e8e8;
    }

    [data-theme="dark"] {
      --bg:     #161616;
      --ink-1:  #e2e2e2;
      --ink-2:  #b2b2b2;
      --ink-3:  #909090;
      --ink-4:  #5e5e5e;
      --rule-1: #383838;
      --rule-2: #2c2c2c;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
      background: var(--bg);
      color: var(--ink-1);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      transition: background 0.2s, color 0.2s;
    }

    /* ── Theme toggle ── */
    .theme-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      display: flex;
      align-items: center;
      gap: 5px;
      background: var(--bg);
      border: 0.5px solid var(--rule-1);
      border-radius: 4px;
      color: var(--ink-4);
      cursor: pointer;
      padding: 5px 9px;
      font-size: 11px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      letter-spacing: 0.04em;
      z-index: 100;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }
    .theme-toggle:hover { color: var(--ink-2); border-color: var(--ink-4); }
    .theme-toggle svg   { width: 12px; height: 12px; fill: currentColor; flex-shrink: 0; }

    /* ── Page content ── */
    .page {
      width: 100%;
      max-width: 480px;
    }

    .page-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 38px;
      font-weight: 400;
      letter-spacing: 0.02em;
      margin: 0 0 6px 0;
      line-height: 1.1;
    }

    .page-subtitle {
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-4);
      margin: 0 0 2.5rem 0;
    }

    /* ── Resume cards ── */
    .cards {
      display: flex;
      flex-direction: column;
      gap: 0;
      border-top: 0.5px solid var(--rule-1);
    }

    .card-row {
      display: flex;
      align-items: center;
      border-bottom: 0.5px solid var(--rule-1);
    }

    .resume-card {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.1rem 0;
      text-decoration: none;
      color: var(--ink-1);
      transition: color 0.15s;
      min-width: 0;
    }

    .resume-card:hover { color: var(--ink-4); }

    .card-name {
      font-size: 14px;
      font-weight: 300;
      letter-spacing: 0.01em;
    }

    .card-arrow {
      font-size: 16px;
      color: var(--ink-4);
      transition: transform 0.15s, color 0.15s;
      flex-shrink: 0;
      margin-right: 1.25rem;
    }

    .resume-card:hover .card-arrow {
      transform: translateX(4px);
      color: var(--ink-2);
    }

    /* ── Export icon links ── */
    .card-exports {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    .export-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      color: var(--ink-4);
      text-decoration: none;
      border: none;
      transition: color 0.15s;
      padding: 0.4rem 0;
    }

    .export-link:hover { color: var(--ink-2); border: none; }

    .export-link svg {
      width: 13px;
      height: 16px;
      flex-shrink: 0;
    }

    .export-label {
      font-size: 8px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      line-height: 1;
    }

    /* ── Mobile ── */
    @media (max-width: 480px) {
      body { padding: 2rem 1.25rem; }
      .page-name { font-size: 30px; }
    }

    /* ── Print ── */
    @media print { .theme-toggle { display: none; } }
  </style>
</head>
<body>

<button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
  <svg id="toggle-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
    <path id="toggle-path" d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/>
  </svg>
  <span id="toggle-label">Dark</span>
</button>

<div class="page">
  <h1 class="page-name">Andrew Atkinson</h1>
  <p class="page-subtitle">Select a résumé</p>
  <nav class="cards">
    
    <div class="card-row">
      <a class="resume-card" href="artist/index.html">
        <span class="card-name">Artist Resume</span>
        <span class="card-arrow">→</span>
      </a>
      <div class="card-exports">
        <a class="export-link" href="pdf/Atkinson_Artist.pdf" download title="Download PDF">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 12 15" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M7 1H2.5A1.5 1.5 0 0 0 1 2.5v10A1.5 1.5 0 0 0 2.5 14h7A1.5 1.5 0 0 0 11 12.5V5L7 1z"/><path d="M7 1v4h4"/></svg><span class="export-label">PDF</span>
        </a>
        <a class="export-link" href="docx/Atkinson_Artist.docx" download title="Download DOCX">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 12 15" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M7 1H2.5A1.5 1.5 0 0 0 1 2.5v10A1.5 1.5 0 0 0 2.5 14h7A1.5 1.5 0 0 0 11 12.5V5L7 1z"/><path d="M7 1v4h4"/></svg><span class="export-label">DOC</span>
        </a>
      </div>
    </div>

    <div class="card-row">
      <a class="resume-card" href="academic/index.html">
        <span class="card-name">Academic Resume</span>
        <span class="card-arrow">→</span>
      </a>
      <div class="card-exports">
        <a class="export-link" href="pdf/Atkinson_Academic.pdf" download title="Download PDF">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 12 15" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M7 1H2.5A1.5 1.5 0 0 0 1 2.5v10A1.5 1.5 0 0 0 2.5 14h7A1.5 1.5 0 0 0 11 12.5V5L7 1z"/><path d="M7 1v4h4"/></svg><span class="export-label">PDF</span>
        </a>
        <a class="export-link" href="docx/Atkinson_Academic.docx" download title="Download DOCX">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 12 15" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M7 1H2.5A1.5 1.5 0 0 0 1 2.5v10A1.5 1.5 0 0 0 2.5 14h7A1.5 1.5 0 0 0 11 12.5V5L7 1z"/><path d="M7 1v4h4"/></svg><span class="export-label">DOC</span>
        </a>
      </div>
    </div>

    <div class="card-row">
      <a class="resume-card" href="professional/index.html">
        <span class="card-name">Professional Resume</span>
        <span class="card-arrow">→</span>
      </a>
      <div class="card-exports">
        <a class="export-link" href="pdf/Atkinson_Professional.pdf" download title="Download PDF">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 12 15" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M7 1H2.5A1.5 1.5 0 0 0 1 2.5v10A1.5 1.5 0 0 0 2.5 14h7A1.5 1.5 0 0 0 11 12.5V5L7 1z"/><path d="M7 1v4h4"/></svg><span class="export-label">PDF</span>
        </a>
        <a class="export-link" href="docx/Atkinson_Professional.docx" download title="Download DOCX">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 12 15" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M7 1H2.5A1.5 1.5 0 0 0 1 2.5v10A1.5 1.5 0 0 0 2.5 14h7A1.5 1.5 0 0 0 11 12.5V5L7 1z"/><path d="M7 1v4h4"/></svg><span class="export-label">DOC</span>
        </a>
      </div>
    </div>
  </nav>
</div>

<script>
  (function () {
    const root  = document.documentElement;
    const btn   = document.getElementById('theme-toggle');
    const label = document.getElementById('toggle-label');
    const path  = document.getElementById('toggle-path');
    const SUN   = 'M12 7a5 5 0 1 0 0 10A5 5 0 0 0 12 7zm0-4a1 1 0 0 1 1 1v1a1 1 0 0 1-2 0V4a1 1 0 0 1 1-1zm0 16a1 1 0 0 1 1 1v1a1 1 0 0 1-2 0v-1a1 1 0 0 1 1-1zm9-9h-1a1 1 0 0 1 0-2h1a1 1 0 0 1 0 2zM4 12a1 1 0 0 1-1 1H2a1 1 0 0 1 0-2h1a1 1 0 0 1 1 1zm14.95 5.54-.7-.71a1 1 0 0 1 1.41-1.41l.71.7a1 1 0 0 1-1.41 1.42zm-13.9 0a1 1 0 0 1-1.41-1.41l.7-.71a1 1 0 1 1 1.42 1.42l-.71.7zM18.24 6.46a1 1 0 0 1 0-1.41l.71-.71a1 1 0 1 1 1.41 1.41l-.7.71a1 1 0 0 1-1.42 0zm-13.9 0a1 1 0 0 1-1.41 0l-.71-.71A1 1 0 0 1 3.63 4.34l.71.71a1 1 0 0 1 0 1.41z';
    const MOON  = 'M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z';
    function applyTheme(dark) {
      root.setAttribute('data-theme', dark ? 'dark' : 'light');
      path.setAttribute('d', dark ? SUN : MOON);
      label.textContent = dark ? 'Light' : 'Dark';
    }
    const saved = localStorage.getItem('cv-theme');
    applyTheme(saved ? saved === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches);
    btn.addEventListener('click', function () {
      const isDark = root.getAttribute('data-theme') === 'dark';
      applyTheme(!isDark);
      localStorage.setItem('cv-theme', isDark ? 'light' : 'dark');
    });
  })();
</script>

</body>
</html>
